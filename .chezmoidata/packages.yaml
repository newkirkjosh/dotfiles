# Declarative package lists, consumed by scripts in .chezmoiscripts/.
# Each script is guarded by .chezmoi.osRelease.id so only the relevant
# section installs on a given host.
#
# Layout:
#   arch:     pacman + AUR + GPU-conditional packages for Arch-family distros
#   bazzite:  flatpak + brew + ujust + distrobox for Bazzite/Fedora Atomic
#   mise:     language runtimes, shared (host on arch; inside distrobox on bazzite)

arch:
  # Official repos (pacman -S)
  pacman:
    # Hyprland desktop
    - hyprland
    - waybar
    - hyprlock
    - hyprshot
    - hypridle
    - xdg-desktop-portal-hyprland
    - xdg-desktop-portal-gtk
    - polkit-kde-agent
    - qt5-wayland
    - qt6-wayland

    # Login manager
    - greetd
    - greetd-tuigreet

    # Terminal + shell
    - ghostty
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - zsh-completions
    - zsh-history-substring-search
    - tmux
    - starship

    # CLI tooling
    - git
    - github-cli
    - ripgrep
    - fd
    - fzf
    - bat
    - eza
    - zoxide
    - jq
    - yq
    - unzip
    - openssh
    - rsync
    - wget
    - curl

    # App launcher / clipboard / screenshot helpers
    - rofi                 # launcher (official extra; works under XWayland on Hyprland)
    - cliphist
    - wl-clipboard
    - grim
    - slurp

    # Audio / media keys
    - pipewire
    - pipewire-pulse
    - wireplumber
    - pavucontrol
    - playerctl
    - brightnessctl

    # File manager
    - dolphin

    # Media apps
    - mpv
    - vlc

    # Fonts
    - ttf-jetbrains-mono-nerd
    - noto-fonts
    - noto-fonts-emoji
    - noto-fonts-cjk

    # Containers
    - docker
    - docker-compose

    # Dev (languages managed via mise; these are system-level only)
    - base-devel
    - neovim

    # Gaming — Steam is 32-bit, multilib must be enabled (install.sh does this)
    - steam
    - gamescope            # Valve's compositor — use as launch wrapper
    - gamemode             # Per-game CPU governor tweaks (Feral)
    - lib32-gamemode
    - mangohud             # FPS / perf overlay
    - lib32-mangohud
    - goverlay             # GUI for MangoHud
    - lutris               # Non-Steam launcher (Battle.net, Epic fallback, etc.)
    - wine-staging
    - winetricks
    - lib32-mesa           # 32-bit AMD/Intel GPU userspace (harmless alongside NVIDIA)
    - vulkan-tools
    - lib32-vulkan-icd-loader

    # Peripherals
    - piper                # GUI for libratbag (G502 X Lightspeed: DPI/buttons/profiles)
    - libratbag            # Daemon (ratbagd) — autostarted by piper
    - headsetcontrol       # G533 battery/sidetone CLI

    # Desktop apps (now in official repos — no AUR needed)
    - discord
    - obsidian

  # AUR (yay -S)
  aur:
    # Auth
    - 1password
    - 1password-cli

    # Browser
    - brave-bin

    # Communication
    - slack-desktop

    # Productivity
    - spotify

    # Dev
    - visual-studio-code-bin
    - android-studio

    # Gaming
    - heroic-games-launcher-bin   # Epic / GOG / Amazon
    - protonup-qt                 # Proton-GE version manager

  # GPU-conditional (installed only when matching GPU is detected)
  gpu_packages:
    nvidia:
      - nvidia-utils
      - lib32-nvidia-utils
      - egl-wayland
      - nvidia-container-toolkit


bazzite:
  # rpm-ostree layered packages — system-level, persisted across rebases.
  # Reserve for things that must run outside a sandbox (native messaging hosts,
  # SSH agents that other host processes need to reach, kernel-adjacent tools).
  # Prefer flatpak/brew/distrobox for everything else.
  rpm_ostree:
    # 1Password — native install required so op-ssh-sign and the agent socket
    # at ~/.1password/agent.sock are reachable from host shells, distrobox, and
    # browser native-messaging without sandbox path translation.
    - 1password

  # Flatpak = GUI apps that AREN'T dev tools (chat, media, auth, gaming extras).
  # Dev GUIs (Warp, Android Studio, etc.) live in the distrobox, not here.
  # Installed at --user scope so they survive rebases cleanly.
  flatpak:
    # Browser
    - com.brave.Browser
    # Communication
    - com.discordapp.Discord
    - com.slack.Slack
    # Productivity
    - md.obsidian.Obsidian
    - com.spotify.Client
    # Gaming extras not shipped in Bazzite base
    - net.davidotek.pupgui2                  # ProtonUp-Qt (Proton-GE manager)
    - io.github.benjamimgois.goverlay        # MangoHud GUI
    - com.usebottles.bottles                 # modern wine wrapper
    # Peripherals
    - org.freedesktop.Piper                  # G502X — talks to host ratbagd

  # Host brew = minimal. Only what the host shell / chezmoi needs.
  # All dev CLI tooling lives inside the distrobox.
  brew:
    - chezmoi
    - 1password-cli           # occasional host-side secret retrieval at apply-time
    - gh                      # GitHub CLI — host-side; arch-dev has its own copy via pacman

  # Bazzite ujust one-liners — curated post-install helpers.
  # Safer than rpm-ostree layering; explore more with `ujust --list`.
  ujust:
    - install-nvidia-extras   # guarded in script: only runs if nvidia GPU detected

  # Arch userland inside Distrobox — primary dev environment.
  # Dotfiles are shared via the home dir; same ~/.zshrc applies here.
  distrobox:
    name: arch-dev
    image: quay.io/toolbx/arch-toolbox:latest

    pacman:
      # Build essentials
      - base-devel
      - git
      - github-cli
      - openssh

      # Shell experience
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-completions
      - zsh-history-substring-search
      - starship
      - tmux

      # CLI tooling
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide
      - jq
      - yq
      - unzip
      - rsync
      - wget
      - curl

      # Optional container workflows inside the dev env
      - docker
      - docker-compose

      # Peripherals accessible from inside the container
      - headsetcontrol          # G533 battery/sidetone CLI (USB HID passes through)

    aur:
      # yay itself is provided by the yay-bin bootstrap in setup-distrobox.sh.
      # Listing it here too causes a yay vs yay-bin conflict.
      - android-studio          # KMP/Android

    # GUI dev apps surfaced to host launcher via `distrobox-export --app`.
    export_apps:
      - android-studio


# Shared across distros. Applied on host for arch, inside distrobox for bazzite.
mise:
  - java@21           # KMP / Android / general JVM
  - node@lts          # frontend + Claude Code tooling
  - go@latest
  - python@3.13
