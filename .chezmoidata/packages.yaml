# Declarative package lists, consumed by scripts in .chezmoiscripts/.
# Each script is guarded by .chezmoi.osRelease.id so only the relevant
# section installs on a given host.
#
# Layout:
#   bazzite:  rpm-ostree + flatpak + brew + ujust + distrobox
#   mise:     language runtimes, installed inside arch-dev distrobox

bazzite:
  # rpm-ostree layered packages — system-level, persisted across rebases.
  # Reserve for things that must run outside a sandbox (native messaging hosts,
  # SSH agents that other host processes need to reach, kernel-adjacent tools).
  # Prefer flatpak/brew/distrobox for everything else.
  rpm_ostree:
    # 1Password — native install required so op-ssh-sign and the agent socket
    # at ~/.1password/agent.sock are reachable from host shells, distrobox, and
    # browser native-messaging without sandbox path translation.
    - 1password

  # Flatpak = GUI apps that AREN'T dev tools (chat, media, auth, gaming extras).
  # Dev GUIs (Warp, Android Studio, etc.) live in the distrobox, not here.
  # Installed at --user scope so they survive rebases cleanly.
  flatpak:
    # Browser
    - com.brave.Browser
    # Communication
    - com.discordapp.Discord
    - com.slack.Slack
    # Productivity
    - md.obsidian.Obsidian
    - com.spotify.Client
    # Gaming extras not shipped in Bazzite base
    - net.davidotek.pupgui2                  # ProtonUp-Qt (Proton-GE manager)
    - io.github.benjamimgois.goverlay        # MangoHud GUI
    - com.usebottles.bottles                 # modern wine wrapper
    # Peripherals
    - org.freedesktop.Piper                  # G502X — talks to host ratbagd

  # Host brew = minimal. Only what the host shell / chezmoi needs.
  # All dev CLI tooling lives inside the distrobox.
  brew:
    - chezmoi
    - 1password-cli           # occasional host-side secret retrieval at apply-time
    - gh                      # GitHub CLI — host-side; arch-dev has its own copy via pacman

  # Bazzite ujust one-liners — curated post-install helpers.
  # Safer than rpm-ostree layering; explore more with `ujust --list`.
  ujust:
    - install-nvidia-extras   # guarded in script: only runs if nvidia GPU detected

  # Arch userland inside Distrobox — primary dev environment.
  # Dotfiles are shared via the home dir; same ~/.zshrc applies here.
  distrobox:
    name: arch-dev
    image: quay.io/toolbx/arch-toolbox:latest

    pacman:
      # Build essentials
      - base-devel
      - git
      - github-cli
      - openssh

      # Shell experience
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-completions
      - zsh-history-substring-search
      - starship
      - tmux

      # CLI tooling
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide
      - jq
      - yq
      - unzip
      - rsync
      - wget
      - curl

      # Quality-of-life CLI
      - openssh                 # ssh-keygen / ssh-add inside the container
      - git-delta               # better diffs for git + chezmoi pager
      - lazygit                 # git TUI
      - btop                    # modern process / resource viewer

      # Optional container workflows inside the dev env
      - docker
      - docker-compose

      # Peripherals accessible from inside the container
      - headsetcontrol          # G533 battery/sidetone CLI (USB HID passes through)

    aur:
      # yay itself is provided by the yay-bin bootstrap in setup-distrobox.sh.
      # Listing it here too causes a yay vs yay-bin conflict.
      - android-studio          # KMP/Android
      - ghostty                 # GPU-accelerated terminal — exported to host launcher

    # GUI dev apps surfaced to host launcher via `distrobox-export --app`.
    export_apps:
      - android-studio
      - ghostty

    # npm globals installed inside the container after mise provisions node.
    # Install ordering: setup-distrobox → install-mise-tools (node) → install-npm-globals.
    npm_globals:
      - "@anthropic-ai/claude-code"

    # Curl-based installers run inside the container. Each entry is run once
    # (re-runs when the list changes — assumed idempotent / self-upgrading).
    curl_installers:
      # Google's Android CLI agent tool — official installer, auto-latest.
      - name: android-cli
        url: https://dl.google.com/android/cli/latest/linux_x86_64/install.sh


# Shared across distros. Applied on host for arch, inside distrobox for bazzite.
mise:
  - java@21           # KMP / Android / general JVM
  - node@lts          # frontend + Claude Code tooling
  - go@latest
  - python@3.13
