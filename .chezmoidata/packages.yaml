# Declarative package lists.
# Packages here are installed by the run_onchange_after_install-*-packages.sh.tmpl scripts
# in .chezmoiscripts/, which rerun only when this file changes.

arch:
  # Official repos (pacman -S)
  pacman:
    # Hyprland desktop
    - hyprland
    - waybar
    - hyprlock
    - hyprshot
    - hypridle
    - xdg-desktop-portal-hyprland
    - xdg-desktop-portal-gtk
    - polkit-kde-agent
    - qt5-wayland
    - qt6-wayland

    # Login manager
    - greetd
    - greetd-tuigreet

    # Terminal + shell
    - ghostty
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - zsh-completions
    - zsh-history-substring-search
    - tmux
    - starship

    # CLI tooling
    - git
    - github-cli
    - ripgrep
    - fd
    - fzf
    - bat
    - eza
    - zoxide
    - jq
    - yq
    - unzip
    - openssh
    - rsync
    - wget
    - curl

    # App launcher / clipboard / screenshot helpers
    - rofi-wayland
    - cliphist
    - wl-clipboard
    - grim
    - slurp

    # Audio / media keys
    - pipewire
    - pipewire-pulse
    - wireplumber
    - pavucontrol
    - playerctl
    - brightnessctl

    # File manager
    - dolphin

    # Media apps
    - mpv
    - vlc

    # Fonts
    - ttf-jetbrains-mono-nerd
    - noto-fonts
    - noto-fonts-emoji
    - noto-fonts-cjk

    # Containers
    - docker
    - docker-compose

    # Dev (languages managed via mise; these are system-level only)
    - base-devel
    - neovim

    # Gaming — Steam is 32-bit, multilib must be enabled (install.sh does this)
    - steam
    - gamescope            # Valve's compositor — use as launch wrapper
    - gamemode             # Per-game CPU governor tweaks (Feral)
    - lib32-gamemode
    - mangohud             # FPS / perf overlay
    - lib32-mangohud
    - goverlay             # GUI for MangoHud
    - lutris               # Non-Steam launcher (Battle.net, Epic fallback, etc.)
    - wine-staging
    - winetricks
    - lib32-mesa           # 32-bit AMD/Intel GPU userspace (harmless alongside NVIDIA)
    - vulkan-tools
    - lib32-vulkan-icd-loader

    # Peripherals
    - piper                # GUI for libratbag (G502 X Lightspeed: DPI/buttons/profiles)
    - libratbag            # Daemon (ratbagd) — autostarted by piper

  # AUR (yay -S)
  aur:
    # Auth
    - 1password
    - 1password-cli

    # Browser
    - brave-bin

    # Communication
    - discord
    - slack-desktop

    # Productivity
    - obsidian
    - spotify

    # Dev
    - visual-studio-code-bin
    - android-studio

    # Gaming
    - heroic-games-launcher-bin   # Epic / GOG / Amazon
    - protonup-qt                 # Proton-GE version manager

    # Peripherals
    - headsetcontrol              # G533 battery/sidetone CLI

  # Flatpak (last resort — prefer AUR where possible)
  flatpak: []

  # GPU-conditional (installed only when matching GPU is detected)
  gpu_packages:
    nvidia:
      - nvidia-utils
      - lib32-nvidia-utils
      - egl-wayland
      - nvidia-container-toolkit

# Tools managed via mise (installed in run_onchange_after_install-mise-tools.sh.tmpl)
mise:
  - java@21           # KMP / Android / general JVM
  - node@lts          # frontend + Claude Code tooling
  - go@latest
  - python@3.13
