# Profile definitions.
# Used for documentation; `install.sh` auto-detects based on hyprctl + battery.

profiles:
  desktop:
    description: Primary workstation — Arch + Hyprland + full dev stack
    features:
      - Hyprland window manager + waybar + hyprlock
      - Ghostty terminal
      - zsh + Starship (standalone plugins, no framework)
      - 1Password (GUI + CLI + SSH agent)
      - Android Studio + JDK via mise (KMP work)
      - Brave, Discord, Slack, Obsidian, Spotify
    packages:
      declarative: .chezmoidata/packages.yaml

  laptop:
    description: Laptop — inherits desktop, adds battery/lid/display tweaks
    features:
      - All desktop features
      - TLP / auto-cpufreq (TBD)
      - Lid-close behavior (TBD)
    packages:
      declarative: .chezmoidata/packages.yaml
