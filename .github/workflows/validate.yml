name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate templates and data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          # yq from the official binary release (apt's yq is a different tool)
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install chezmoi
        run: |
          sudo sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Initialize chezmoi with test data
        # The repo's .chezmoi.toml.tmpl uses promptStringOnce; supply dummy
        # answers so init does not block. --source points chezmoi at the
        # checked-out repo so we don't clone over the network.
        #
        # NOTE: --promptString keys are the *prompt text* (3rd arg of
        # promptStringOnce in .chezmoi.toml.tmpl), not the data key. If those
        # prompt strings change, update them here to match.
        env:
          CHEZMOI_SOURCE: ${{ github.workspace }}
        run: |
          chezmoi init \
            --source="$CHEZMOI_SOURCE" \
            --promptString "Full name (for git)=Test User" \
            --promptString "Email (for git)=test@example.com" \
            --promptString "SSH public key for commit signing (leave blank to skip)=" \
            --no-tty

      - name: Run validation
        run: bash test/validate.sh
