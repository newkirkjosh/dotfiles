# Starship — Tokyo Night-inspired minimal config.
# For the fuller vendored preset: `starship preset tokyo-night -o ~/.config/starship.toml`

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$java$nodejs$golang$python$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold #7aa2f7)"
error_symbol = "[❯](bold #f7768e)"
vimcmd_symbol = "[❮](bold #9ece6a)"

[directory]
style = "bold #7aa2f7"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "#bb9af7"
format = "on [$symbol$branch]($style) "

[git_status]
style = "#e0af68"
format = "([$all_status$ahead_behind]($style) )"

[cmd_duration]
min_time = 2000
style = "#9ece6a"
format = "took [$duration]($style) "

[python]
symbol = " "
style = "#9ece6a"
format = "via [$symbol$pyenv_prefix($version )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = " "
style = "#9ece6a"
format = "via [$symbol($version )]($style)"

[golang]
symbol = " "
style = "#7dcfff"
format = "via [$symbol($version )]($style)"

[rust]
symbol = " "
style = "#f7768e"
format = "via [$symbol($version )]($style)"

[java]
symbol = " "
style = "#bb9af7"
format = "via [$symbol($version )]($style)"

[kotlin]
symbol = " "
style = "#bb9af7"

[docker_context]
symbol = " "
style = "#7dcfff"
