# Hyprland config — starter. Iterate as the setup is used.
# Full reference: https://wiki.hyprland.org

# ─── Monitors ────────────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ─── Environment ─────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1

# ─── Autostart ───────────────────────────────────────────────────────
exec-once = waybar
exec-once = hypridle
exec-once = 1password --silent
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─── Input ───────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}

# ─── General ─────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ee)
    col.inactive_border = rgba(565f89aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = yes
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ─── Keybinds ────────────────────────────────────────────────────────
$mod = SUPER
$terminal = ghostty
$browser = brave
$fileManager = dolphin
$menu = wofi --show drun

bind = $mod, Return, exec, $terminal
bind = $mod, B, exec, $browser
bind = $mod, E, exec, $fileManager
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod SHIFT, L, exec, hyprlock   # mod+L alone is movefocus-right

# Screenshots
bind = , Print, exec, hyprshot -m region
bind = SHIFT, Print, exec, hyprshot -m window
bind = CTRL, Print, exec, hyprshot -m output

# Focus (vim-style)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Media keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
